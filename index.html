<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Café - Blog do Pyetro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container-principal">

        <header class="cabecalho">
            <h1>Meu Café</h1>
            <p>Compartilhando aromas, sabores e histórias sobre café</p>
        </header>

        <article class="conteudo">
            
            <img src="img/cafe.jpg" alt="Uma linda xícara de café sobre a mesa" class="imagem-cafe">

            <h2>Meu primeiro café</h2>
            
            <p class="autor">Por: Pyetro Dehon Goll</p>

            <p>
                Bem-vindo ao meu blog sobre café! Aqui vou compartilhar dicas de preparo,
                curiosidades sobre grãos, métodos de extração e experiências do universo cafeeiro.
            </p>

            <section class="botoes">
                <button class="btn-coracao" aria-label="Favoritar este post">
                    <span>❤️</span> Favoritar
                </button>
                <button class="btn-like" aria-label="Curtir este post">
                    <span>👍</span> Like
                </button>
                <button class="btn-deslike" aria-label="Não curtir este post">
                    <span>👎</span> Deslike
                </button>
            </section>

        </article>

    </main>

</body>
</html>
